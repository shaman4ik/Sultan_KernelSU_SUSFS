name: Sultan
permissions:
  contents: write # Allow writing to repository contents (for pushing tags)
  actions: write # Allows triggering actions

on:
  workflow_call: # This allows this workflow to be called from another workflow
    inputs:
      codename:
        required: true
        type: string
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Stage 1 (Replace): ReSukiSU + susfs v2.0.0 + ZeroMount. stock is validated
        # separately on the baseline line; this branch builds only the experiment.
        features: ["resukisu-zeromount"]
    steps:
      - name: Checkout orchestration repo (vendored ./zeromount)
        uses: actions/checkout@v4
        with:
          path: orchestration

      - name: Download and extract GCC 14.2.0 toolchain
        run: |
          echo "Downloading GCC 14.2.0 cross-compiler toolchain..."
          wget https://www.kernel.org/pub/tools/crosstool/files/bin/x86_64/14.2.0/x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar.gz
          echo "Extracting .gz file..."
          gunzip x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar.gz
          echo "Extracting .tar file..."
          tar -xf x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar
          echo "GCC 14.2.0 toolchain extracted successfully"

      - name: Set CONFIG Environment Variable
        run: |
          CONFIG="android_kernel_google_tensynos"
          echo "CONFIG=$CONFIG" >> $GITHUB_ENV
          # Vendored ZeroMount/ReSukiSU set (patches + build-helpers + pin + fragment)
          echo "ORCH=$GITHUB_WORKSPACE/orchestration/zeromount" >> $GITHUB_ENV
          echo "CONFIG set to: $CONFIG"

      - name: Clone AnyKernel3 and kernel source
        run: |
          ANYKERNEL_BRANCH="sultan-${{ inputs.codename }}"
          echo "Using branch for AnyKernel3: $ANYKERNEL_BRANCH"
          git clone https://github.com/TheWildJames/AnyKernel3.git -b "$ANYKERNEL_BRANCH"
          # Pin the kernel source to the branch CP3 was validated against (drift guard).
          git clone https://github.com/kerneltoast/android_kernel_google_tensynos -b 16.0.0-sultan --depth=1

      - name: Integrate ReSukiSU + apply susfs/zeromount patches
        if: matrix.features == 'resukisu-zeromount'
        run: |
          set -uo pipefail
          cd "$CONFIG"

          echo "::group::ReSukiSU setup (pinned)"
          # setup.sh is fetched from ReSukiSU/main; the integrated source is then PINNED
          # to resukisu-pin.txt so the moving branch can't drift the build.
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s susfs-ksud
          KSU_DIR=KernelSU
          if [ ! -d "$KSU_DIR" ]; then echo "FATAL: ReSukiSU setup did not create $KSU_DIR"; exit 1; fi
          PIN="$(cat "$ORCH/resukisu-pin.txt")"
          ( cd "$KSU_DIR" && git fetch origin && git checkout "$PIN" )
          echo "ReSukiSU pinned to $PIN"
          echo "::endgroup::"

          AV="${{ inputs.android_version }}"; KV="${{ inputs.kernel_version }}"
          PATCHES="$ORCH/patches"

          echo "::group::Apply 50_ / 51_ (susfs base, in tree root)"
          patch -p1 -F3 --no-backup-if-mismatch < "$PATCHES/50_add_susfs_in_gki-${AV}-${KV}.patch" || true
          # tensynos custom newuname: 50_ Hunk#3 rejects -> resolve the spoof insertion by hand
          bash "$ORCH/build-helpers/fix-tensynos-newuname.sh" kernel/sys.c
          rm -f kernel/sys.c.rej
          patch -p1 -F3 --no-backup-if-mismatch < "$PATCHES/51_enhanced_susfs-${AV}-${KV}.patch" || true
          echo "::endgroup::"

          echo "::group::Apply 70_ (ReSukiSU supercall safety, in KSU dir) then supercalls massage"
          P70="$PATCHES/70_ksu_safety-resukisu-${KV}.patch"
          ( cd "$KSU_DIR" && { [ -s "$P70" ] && patch -p1 --no-backup-if-mismatch < "$P70" || echo "no 70_ patch needed"; } )
          # Post-setup massage (order: AFTER 70_, see CHECKPOINT3 — sed-first rejects 70_ Hunk#1).
          SUPER="drivers/kernelsu/supercalls.c"
          if [ -f "$SUPER" ]; then
            sed -i '/ksu_mark_running_process/d' "$SUPER"
            if grep -q "vzalloc" "$SUPER" && ! head -5 "$SUPER" | grep -q "vmalloc.h"; then
              sed -i '1a #include <linux/vmalloc.h>' "$SUPER"
            fi
          fi
          echo "::endgroup::"

          echo "::group::Apply 60_ (ZeroMount VFS, in tree root)"
          patch -p1 -F3 --no-backup-if-mismatch < "$PATCHES/60_zeromount-${AV}-${KV}.patch" || true
          echo "::endgroup::"

          echo "::group::fix-susfs-compat (sublevel-dependent source fixes)"
          SUBLEVEL="$(awk '/^SUBLEVEL =/{print $3}' Makefile)"
          echo "SUBLEVEL=$SUBLEVEL"
          bash "$ORCH/build-helpers/fix-susfs-compat.sh" . "$SUBLEVEL" "$AV" "$KV" "" || true
          echo "::endgroup::"

          echo "::group::Strict reject gate (CP3 criterion: zero .rej)"
          if find . -name '*.rej' | grep -q .; then
            echo "FATAL: unresolved rejects present:"; find . -name '*.rej'
            exit 1
          fi
          echo "no .rej — clean"
          echo "::endgroup::"

      - name: Assemble defconfig (susfs + overlayfs + ZeroMount)
        if: matrix.features == 'resukisu-zeromount'
        run: |
          set -uo pipefail
          cd "$CONFIG"
          DEFCONFIG="arch/arm64/configs/${{ inputs.codename }}_defconfig"
          # [base]=CONFIG_KSU=y always; --susfs pulls [susfs] (incl CONFIG_KSU_SUSFS_SPOOF_UNAME=y);
          # --overlayfs pulls TMPFS_XATTR/POSIX_ACL (mountify). No --kleaf: legacy make path.
          bash "$ORCH/build-helpers/assemble-defconfig.sh" "$ORCH/defconfig.fragment" /tmp/frag.dst "$DEFCONFIG" --susfs --overlayfs
          # ZeroMount is NOT in the fragment (60_ only patched gki_defconfig) -> add it to the device defconfig.
          grep -q '^CONFIG_ZEROMOUNT=y' "$DEFCONFIG" || echo 'CONFIG_ZEROMOUNT=y' >> "$DEFCONFIG"
          echo "=== CP4 grep on INPUT defconfig ($DEFCONFIG) ==="
          grep -nE "CONFIG_ZEROMOUNT|CONFIG_KSU=|CONFIG_KSU_SUSFS=|CONFIG_KSU_SUSFS_SPOOF_UNAME" "$DEFCONFIG" || true

      - name: Brand localversion
        if: matrix.features == 'resukisu-zeromount'
        run: |
          cd "$CONFIG"
          sed -i 's/CONFIG_LOCALVERSION="-Sultan"/CONFIG_LOCALVERSION="-Sultan-ZeroMount"/' ./arch/arm64/configs/${{ inputs.codename }}_defconfig || true
          sed -i '/echo "+"$/d' scripts/setlocalversion || true

      - name: Build the Kernel
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG"

          make CROSS_COMPILE=$GITHUB_WORKSPACE/gcc-14.2.0-nolibc/aarch64-linux/bin/aarch64-linux- CC=$GITHUB_WORKSPACE/gcc-14.2.0-nolibc/aarch64-linux/bin/aarch64-linux-gcc -j$(nproc --all) ${{ inputs.codename }}_defconfig
          make CROSS_COMPILE=$GITHUB_WORKSPACE/gcc-14.2.0-nolibc/aarch64-linux/bin/aarch64-linux- CC=$GITHUB_WORKSPACE/gcc-14.2.0-nolibc/aarch64-linux/bin/aarch64-linux-gcc LOCALVERSION_AUTO=0 -j$(nproc --all)

      - name: CP4 verify on generated .config
        if: matrix.features == 'resukisu-zeromount'
        run: |
          cd "$CONFIG"
          CFG="out/.config"; [ -f "$CFG" ] || CFG=".config"
          echo "=== CP4: configs that SURVIVED into $CFG ==="
          grep -nE "^CONFIG_ZEROMOUNT=|^CONFIG_KSU=|^CONFIG_KSU_SUSFS=|^CONFIG_KSU_SUSFS_SPOOF_UNAME=" "$CFG" \
            || echo "WARNING: expected configs missing from $CFG"

      - name: Copy Images
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG"

          echo "Copying Image.lz4 and concatenating DTB files..."
          cp ./out/arch/arm64/boot/Image.lz4 ../AnyKernel3/Image.lz4
          if [ "${{ inputs.codename }}" == "gs201" ]; then
            cat ./out/google-devices/gs201/dts/*.dtb > ../AnyKernel3/dtb
            #cp ./out/google-devices/gs201/dts/dtbo.img ../AnyKernel3/dtbo.img
          elif [ "${{ inputs.codename }}" == "zuma" ]; then
            cat ./out/google-devices/zuma/dts/*.dtb > ../AnyKernel3/dtb
          elif [ "${{ inputs.codename }}" == "zumapro" ]; then
            cat ./out/google-devices/zumapro/dts/*.dtb > ../AnyKernel3/dtb
          fi

      - name: Create ZIP Files for Different Formats
        run: |
          echo "Navigating to AnyKernel3 directory..."
          cd ./AnyKernel3

          ZIP_NAME="${{ inputs.codename }}-a16-${{ matrix.features }}-anykernel3.zip"
          echo "Creating zip file $ZIP_NAME..."
          zip -r "../$ZIP_NAME" ./*

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ inputs.codename }}-${{ matrix.features }}
          path: |
            *.zip

      - name: Collect .rej files
        if: ${{ always() }}
        id: collect_rej
        shell: bash
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"
          rm -rf rej
          mkdir -p rej

          found="false"
          while IFS= read -r -d '' rej_file; do
            found="true"
            original_file="${rej_file%.rej}"
            rej_rel="${rej_file#./}"
            original_rel="${original_file#./}"

            mkdir -p "rej/$(dirname "$rej_rel")"
            cp -f "$rej_file" "rej/$rej_rel"

            if [[ -f "$original_file" ]]; then
              mkdir -p "rej/$(dirname "$original_rel")"
              cp -f "$original_file" "rej/$original_rel"
            fi
          done < <(find . -type f -name '*.rej' -print0)

          echo "found=$found" >> "$GITHUB_OUTPUT"

      - name: Zip collected .rej bundle
        if: ${{ always() && steps.collect_rej.outputs.found == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          zip -r "rej-${{ inputs.codename }}-${{ matrix.features }}.zip" rej

      - name: Upload .rej bundle
        if: ${{ always() && steps.collect_rej.outputs.found == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: rej-${{ inputs.codename }}-${{ matrix.features }}
          path: |
            rej-${{ inputs.codename }}-${{ matrix.features }}.zip
